name = "grow-app"
main = "worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

# Shared-grow state (JSON blob + rev) and family accounts live here.
[[d1_databases]]
binding = "DB"
database_name = "growapp"
database_id = "d3bcd886-d02f-4d1f-8e13-eba8638d1d42"

# Photos (data-URL text, one object per photo id).
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "growapp-photos"

# Secrets are NOT stored here. Set them once with:
#   wrangler secret put FAMILY_CODE
#   wrangler secret put AUTH_SECRET

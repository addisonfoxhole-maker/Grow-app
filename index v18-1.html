function calCompare(plants){
  const DAY=864e5;
  const runs=plants.map(p=>{ const t=plantTimeline(p);
    const start=new Date(t.start).getTime();
    const done=!!p.finishedAt;
    const harv=done?new Date(p.finishedAt).getTime():new Date(t.harvestDate).getTime();
    const dry=+p.dryG||0, cost=plantCost(p.id);
    return {p,t,start,harv,done,cycle:Math.max(1,Math.round((harv-start)/DAY)),cost,dry,ppg:done&&dry>0?cost/dry:null,notes:plantNotes(p).length};
  });
  const groups={}; runs.forEach(r=>{ (groups[r.p.name]=groups[r.p.name]||[]).push(r); });
  const names=Object.keys(groups).sort();
  const bar=r=>{ const span=Math.max(1,r.harv-r.start);
    const segs=r.t.stages.filter(s=>s.key!=="harvest").map(s=>{ const f=new Date(s.fromDate).getTime(), to=Math.min(new Date(s.toDate).getTime(),r.harv); const w=(to-f)/span*100; return w>0.3?`<span style="width:${w.toFixed(1)}%;background:${STAGE_COLOR[s.key]}"></span>`:""; }).join("");
    return `<div class="cmp-bar">${segs}</div>`;
  };
  const runCard=r=>{
    const startStr=new Date(r.start).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    const harvStr=new Date(r.harv).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    const stageTag=r.done?`<span class="cmp-stage done" style="--sc:var(--good)">✓ Finished</span>`:`<span class="cmp-stage" style="--sc:${STAGE_COLOR[r.t.cur.key]||'var(--accent)'}">${esc(r.t.cur.label)}</span>`;
    const mid=r.done
      ? `<span><b>${r.dry||"–"}g</b> dry</span>`+(r.ppg!=null?`<span><b>${money(r.ppg)}</b>/g</span>`:`<span><b>${money0(r.cost)}</b> spent</span>`)
      : `<span><b>${r.t.daysToHarvest}d</b> to harvest</span><span><b>${money0(r.cost)}</b> spent</span>`;
    return `<button class="cmp-run${r.done?' done':''}" data-act="open-plant" data-id="${r.p.id}">`
      +`<div class="cmp-rhead"><span class="cmp-rn">${esc(r.p.name)}</span>${stageTag}</div>`
      +`<div class="cmp-rsub">${r.p.batch?esc(r.p.batch)+" · ":""}${r.done?("harvested "+harvStr):("started "+startStr)}</div>`
      +bar(r)
      +`<div class="cmp-stats"><span><b>${r.cycle}d</b> cycle</span>${mid}<span><b>${r.notes}</b> note${r.notes!==1?"s":""}</span></div>`
      +`</button>`;
  };
  let html=`<div class="cmp-intro">Line up your runs — stage timeline and spend side by side. Same-strain runs are grouped so you can see how this run compares to the last.</div>`;
  names.forEach(nm=>{ const g=groups[nm];
    if(g.length>1){
      const avgC=Math.round(g.reduce((a,r)=>a+r.cycle,0)/g.length), avgCost=g.reduce((a,r)=>a+r.cost,0)/g.length;
      const fr=g.filter(r=>r.done&&r.dry>0); const gPpg=fr.length?(fr.reduce((a,r)=>a+r.cost,0)/fr.reduce((a,r)=>a+r.dry,0)):null;
      html+=`<div class="cmp-group same"><div class="cmp-gh"><span class="cmp-gn">${esc(nm)}</span><span class="cmp-gmeta">${g.length} runs · avg ${avgC}d${gPpg!=null?" · "+money(gPpg)+"/g":" · avg "+money0(avgCost)}</span></div>${g.map(runCard).join("")}</div>`;
    } else {
      html+=`<div class="cmp-group">${g.map(runCard).join("")}</div>`;
    }
  });
  const allNotes=[]; plants.forEach(p=>{ plantNotes(p).forEach(n=>allNotes.push({p,n})); });
  allNotes.sort((a,b)=>new Date(b.n.at)-new Date(a.n.at));
  const noteRows = allNotes.length ? allNotes.map(({p,n})=>{ const tag=n.tag||"note"; const search=(p.name+" "+(n.text||"")+" "+tag).toLowerCase();
    return `<button class="cmp-note" data-act="open-plant" data-id="${p.id}" data-search="${esc(search)}">`
      +`<span class="cmp-nmeta"><span class="cmp-npn" style="--sc:${STAGE_COLOR[p.stage]||'var(--accent)'}">${esc(p.name)}</span><span class="cmp-ndate">${fmtDate(n.at)}</span><span class="note-tag" style="--tc:${NOTE_TAG_COLOR[tag]||'#9aa7a5'}">${esc(cap(tag))}</span></span>`
      +`<span class="cmp-ntx">${esc(n.text)}</span></button>`;
  }).join("") : `<div class="tile-sub">No notes yet — add them on each plant's page.</div>`;
  html+=`<div class="dsec"><div class="dsec-h">Notes across runs</div>`
    +`<input class="ti note-search" id="cmp-note-search" placeholder="Search all notes — feeding, nute burn, topped…">`
    +`<div class="note-list" id="cmp-note-list">${noteRows}</div></div>`;
  return html;
}

/* ============ Plant tie — attach a task or expense to one+ plants (plantIds[]) ============
   Empty plantIds = whole grow. Tied expenses split evenly across their plants for the
   By-plant breakdown; untied stay as shared overhead (not force-allocated). */
function plantChips(ids, kind, id){
  ids = ids||[];
  const inner = ids.length
    ? ids.map(pid=>{ const p=plantById(pid); return p?`<span class="pchip" style="--sc:${STAGE_COLOR[p.stage]||'var(--accent)'}">${esc(p.name)}</span>`:""; }).join("")
    : `<span class="pchip add">＋ plant</span>`;
  return `<button class="ptie" data-act="tie-${kind}" data-id="${id}" aria-label="tie to plant">${inner}</button>`;
}
function plantTieModal(kind, id){
  const list = kind==="task" ? (state.tasks||[]) : (state.expenses||[]);
  const item = list.find(x=>x.id==id); if(!item) return;
  const sel = new Set(item.plantIds||[]);
  const chips = (state.plants||[]).map(p=>`<button class="tie-chip${sel.has(p.id)?' sel':''}" data-pid="${p.id}" style="--sc:${STAGE_COLOR[p.stage]||'var(--accent)'}"><span class="tie-dot"></span>${esc(p.name)}</button>`).join("");
  const s=document.createElement("div"); s.className="scrim";
  s.innerHTML=`<div class="modal"><h3>Tie to plant</h3>`
    +`<p>${kind==="task"?"Which plant is this task for?":"Which plant is this cost for?"} Pick one or more — or none for the whole grow.</p>`
    +`<div class="tie-wrap">${chips||'<span class="tile-sub">No plants yet.</span>'}</div>`
    +`<div class="ma" style="margin-top:16px"><button class="btn ghost" data-no>Cancel</button><button class="btn primary" data-yes>Save</button></div></div>`;
  document.body.appendChild(s); requestAnimationFrame(()=>s.classList.add("show"));
  const close=()=>{ s.classList.remove("show"); setTimeout(()=>s.remove(),200); };
  s.addEventListener("click",e=>{
    const c=e.target.closest("[data-pid]");
    if(c){ const pid=Number(c.dataset.pid); if(sel.has(pid)){sel.delete(pid);c.classList.remove("sel");}else{sel.add(pid);c.classList.add("sel");} return; }
    if(e.target===s||e.target.hasAttribute("data-no")) return close();
    if(e.target.hasAttribute("data-yes")){
      item.plantIds=[...sel]; save(); close(); renderAll();
      toast(sel.size?("Tied to "+sel.size+" plant"+(sel.size>1?"s":"")+"."):"Set to whole grow.");
    }
  });
}

function libListHtml(kind){
  const items = kind==="task"?TASK_LIB:SUPPLY_LIB;
  const cats=[]; items.forEach(i=>{ if(cats.indexOf(i.cat)<0) cats.push(i.cat); });
  return cats.map(c=>{
    const rows=items.map((it,idx)=>({it,idx})).filter(o=>o.it.cat===c).map(o=>{
      const it=o.it;
      const right = kind==="task" ? "" : `<span class="lib-cost">$${it.cost}${it.unit?` · ${esc(it.unit)}`:""}</span>`;
      const sub = (kind==="task" && it.desc) ? `<span class="lib-d">${esc(it.desc)}</span>` : "";
      const main = kind==="task" ? it.title : it.label;
      const dot = kind==="task" ? "" : `<span class="lib-cdot" style="background:${CAT_COLOR[it.cat]||'var(--accent)'}"></span>`;
      return `<button class="lib-item" data-li="${o.idx}"><span class="lib-box"></span>${dot}<span class="lib-main"><b>${esc(main)}</b>${sub}</span>${right}</button>`;
    }).join("");
    return `<div class="lib-cat">${esc(cap(c))}</div>${rows}`;

/* ============ shell render ============ */
function greetWord(){ const h=new Date().getHours(); return h<5?"Still up":h<12?"Good morning":h<17?"Good afternoon":h<21?"Good evening":"Evening"; }
function greetSub(){
  if(!state.plants.length) return "No plants connected yet";
  const att = attentionList().length;
  const stage = state.stage ? state.stage.replace(/([A-Z])/g," $1").replace(/^./,c=>c.toUpperCase()) : "";
  const day = (state.dayOfGrow!=null) ? "Day "+state.dayOfGrow+" · " : "";
  const lead = day + (stage?stage+" · ":"");
  if(att) return lead + att + (att===1?" plant needs attention":" plants need attention");
  return lead + state.plants.length + " plants, all healthy";
}
function navPill(){
  const att = attentionList();
  if(!att.length) return {st:"var(--good)", k:"Status", v:"All healthy", calm:true, target:"dashboard", plantId:null};
  const t=att[0];
  // tap routes to the plant that needs you; reservoir (no plant) -> dashboard
  const pid = t.plant ? t.plant.id : null;
  return {st:"var(--bad)", k:t.type==="reservoir"?"Refill":"Water now", v:t.title, calm:false, target: pid?"plant":"dashboard", plantId: pid};
}

  document.querySelector('meta[name=theme-color]').setAttribute("content", getComputedStyle(document.documentElement).getPropertyValue("--bg").trim());
  hydratePhotos();
  const gs=document.querySelector(".gantt-scroll"); if(gs){ const tx=parseFloat(gs.dataset.today||"0"); gs.scrollLeft=Math.max(0, tx - gs.clientWidth*0.42); }
}

/* ============ actions (event delegation) ============ */
function go(view){ state.view=view; save(); renderAll(); window.scrollTo({top:0}); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2400); }
function confirmModal(title, body, danger, onYes){
  const s=document.createElement("div"); s.className="scrim";
  s.innerHTML=`<div class="modal"><h3>${esc(title)}</h3><p>${esc(body)}</p>
    <div class="ma"><button class="btn ghost" data-no>Cancel</button>
    <button class="btn ${danger?'danger':'primary'}" data-yes>${danger?'Delete':'Confirm'}</button></div></div>`;
  document.body.appendChild(s); requestAnimationFrame(()=>s.classList.add("show"));
  const close=()=>{ s.classList.remove("show"); setTimeout(()=>s.remove(),200); };
  s.addEventListener("click",e=>{ if(e.target===s||e.target.hasAttribute("data-no")) close();
    if(e.target.hasAttribute("data-yes")){ close(); onYes(); } });
}

document.addEventListener("click", e=>{
  const el = e.target.closest("[data-act]"); if(!el) return;
  const act = el.dataset.act, v = el.dataset.v, id = el.dataset.id;
  if(act==="go") return go(v);
  if(act==="pill"){ const pp=navPill(); if(pp.plantId){ state.activePlantId=pp.plantId; state.view="plant"; save(); renderAll(); window.scrollTo({top:0}); } else { go(pp.target); } return; }
  if(act==="toggle-theme"){ state.theme = state.theme==="dark"?"light":"dark"; applyTheme(); save(); renderAll(); return; }
  if(act==="theme"){ state.theme=v; applyTheme(); save(); renderAll(); return; }
  if(act==="units"){ state.units=v; save(); renderAll(); return; }
  if(act==="toggle-zone"){ zoneOpen[el.dataset.zone]=!zoneOpen[el.dataset.zone];
    const wrap=document.querySelector(`[data-zone-wrap="${el.dataset.zone}"]`); if(wrap) wrap.classList.toggle("closed"); return; }
  if(act==="water"){ const p=state.plants.find(x=>x.id==id); if(p){ p.soil=60; p.soilSeenMin=0; p.wateredToday=true; save(); renderAll(); toast(p.name+" watered — logged. Nice."); } return; }
  if(act==="ack"){ const p=state.plants.find(x=>x.id==id); if(p){ p.soil=62; p.soilSeenMin=0; save(); renderAll(); toast("Noted — ease off the water for a bit."); } return; }
  if(act==="refill"){ if(state.reservoir){ state.reservoir.level=100; state.reservoir.seenMin=0; save(); renderAll(); toast("Reservoir topped up."); } return; }
  if(act==="snooze"){ toast("Okay — I'll nudge you later."); return; }
  if(act==="load-sample"){ seedSample(); go("dashboard"); toast("Sample data loaded."); return; }
  if(act==="delete-all"){ confirmModal("Delete all data?","This clears every plant and reading on this device. You can reload sample data anytime.",true,()=>{ clearData(); renderAll(); toast("All data cleared."); }); return; }
  if(act==="open-plant"){ state.activePlantId=Number(id); state.view="plant"; save(); renderAll(); window.scrollTo({top:0}); return; }
  if(act==="cal-view"){ state.calendarView=v; state.calMonthSel=null; save(); renderAll(); return; }
  if(act==="cal-month-prev"){ state.calMonthOff=(state.calMonthOff||0)-1; state.calMonthSel=null; save(); renderAll(); return; }
  if(act==="cal-month-next"){ state.calMonthOff=(state.calMonthOff||0)+1; state.calMonthSel=null; save(); renderAll(); return; }
  if(act==="cal-day"){ state.calMonthSel=v; save(); renderAll(); return; }
  if(act==="cal-month-view"){ state.calMonthDetail=v; save(); renderAll(); window.scrollTo({top:0}); return; }
  if(act==="cal-month-back"){ state.calMonthDetail=null; save(); renderAll(); return; }
  if(act==="add-plant"){ editPlantModal(null); return; }
  if(act==="edit-plant"){ editPlantModal(plantById(id)); return; }
  if(act==="add-photo"){ pendingPhotoPlant=Number(id); const pi=document.getElementById("photoInput"); if(pi) pi.click(); return; }
  if(act==="open-gallery"){ const pp=plantById(id); if(pp) galleryModal(pp); return; }
  if(act==="add-note"){ const pp=plantById(id); const ta=document.getElementById("note-new"); const tg=document.getElementById("note-tag"); const v=ta&&ta.value.trim(); if(pp&&v){ if(!Array.isArray(pp.notes)) pp.notes=[]; pp.notes.push({id:Date.now(),at:isoNow(),text:v,tag:(tg&&tg.value)||"note"}); save(); renderAll(); toast("Note added."); } return; }
  if(act==="del-note"){ const pp=plantById(id); if(pp&&Array.isArray(pp.notes)){ const nid=el.dataset.nid; pp.notes=pp.notes.filter(n=>String(n.id)!==String(nid)); save(); renderAll(); } return; }
  if(act==="tie-task"){ plantTieModal("task", id); return; }
  if(act==="tie-expense"){ plantTieModal("expense", id); return; }
  if(act==="lib-task"){ libraryModal("task"); return; }
  if(act==="lib-shop"){ libraryModal("supply-shop"); return; }
  if(act==="lib-supply"){ libraryModal("supply-budget"); return; }
  if(act==="del-photo"){ const p=plantById(el.dataset.pid); if(p){ p.photos=(p.photos||[]).filter(ph=>String(ph.id)!==String(el.dataset.id)); } try{ IDB.del(el.dataset.id); }catch(e){} photoDelete(el.dataset.id); const it=el.closest(".gm-item"); if(it) it.remove(); save(); toast("Photo deleted."); return; }
  if(act==="toggle-gtask"){ const k=el.dataset.key; state.taskDone=state.taskDone||{}; state.taskDone[k]=!state.taskDone[k]; save(); renderAll(); return; }
  if(act==="set-yield"){ const i=document.getElementById("yield-g"); const g=i&&parseFloat(i.value); state.yieldG=(g>0?g:0); save(); renderAll(); toast(g>0?"Estimate set.":"Estimate cleared."); return; }
  if(act==="show-tutorial"){ try{ tutorialOverlay(); }catch(e){} return; }
  if(act==="set-mode"){ state.loginMode=el.dataset.mode||"login"; renderAll(); return; }
  if(act==="login-email"){ const u=syncBaseUrl(); const em=((document.getElementById("login-email")||{}).value||"").trim(); const pw=(document.getElementById("login-pass")||{}).value||""; if(!em||!pw){ toast("Enter your email and password."); return; } if(!u){ toast("No server set \u2014 add your Worker URL in Settings \u203a Account."); return; } toast("Logging in\u2026"); loginEmail(u, em, pw).then(afterLogin).catch(function(err){ toast(String((err&&err.message)||"Login failed")); }); return; }
  if(act==="register-acct"){ const u=syncBaseUrl(); const em=((document.getElementById("login-email")||{}).value||"").trim(); const pw=(document.getElementById("login-pass")||{}).value||""; const fc=(document.getElementById("login-fam")||{}).value||""; if(!em||!pw||!fc){ toast("Enter email, password, and the family code."); return; } if(!u){ toast("No server set \u2014 add your Worker URL in Settings \u203a Account."); return; } toast("Creating account\u2026"); registerAccount(u, em, pw, fc).then(afterLogin).catch(function(err){ toast(String((err&&err.message)||"Couldn\u2019t create account")); }); return; }
  if(act==="family-join"){ const u=syncBaseUrl(); const fc=(document.getElementById("login-fam")||{}).value||""; if(!fc){ toast("Enter the family code."); return; } if(!u){ toast("No server set \u2014 add your Worker URL in Settings \u203a Account."); return; } toast("Joining\u2026"); joinFamily(u, fc).then(afterLogin).catch(function(err){ toast(String((err&&err.message)||"Couldn\u2019t join")); }); return; }
  if(act==="login-local"){ state.loggedIn=true; save(); renderAll(); if(!state.tutorialSeen){ try{ tutorialOverlay(); }catch(e){} } return; }
  if(act==="toggle-stay"){ state.stayLoggedIn=!state.stayLoggedIn; save(); renderAll(); return; }
  if(act==="save-url"){ const u=((document.getElementById("acct-url")||{}).value||"").trim().replace(/\/+$/,""); sync.url=u; syncSave(); toast(u?"Server saved.":"Server cleared."); renderAll(); return; }
  if(act==="log-out"){ sync={url:(sync&&sync.url)||"",token:"",rev:0,on:false}; syncSave(); state.loggedIn=false; save(); renderAll(); toast("Logged out."); return; }
  if(act==="show-login"){ state.loggedIn=false; save(); renderAll(); return; }
  if(act==="sync-now"){ toast("Syncing\u2026"); syncPull(true).then(function(){ toast("Synced."); }).catch(function(){}); return; }
  if(act==="update-app"){ toast("Checking for the latest\u2026"); if("serviceWorker" in navigator){ navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ if(r.update){ try{ r.update(); }catch(e){} } }); }); } if(window.caches&&caches.keys){ caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); }).then(function(){ setTimeout(function(){ location.reload(); }, 400); }); } else { setTimeout(function(){ location.reload(); }, 400); } return; }
  if(act==="finish-plant"){ const pp=plantById(id); if(pp) finishModal(pp); return; }
  if(act==="reopen-plant"){ const pp=plantById(id); if(pp){ pp.finishedAt=null; save(); renderAll(); toast("Reopened — back to active."); } return; }
  if(act==="save-power"||act==="log-power"){ const g=id=>parseFloat((document.getElementById(id)||{}).value)||0; const vw=g("pw-vw"), vh=g("pw-vh")||18, fw=g("pw-fw"), fh=g("pw-fh")||12, r=g("pw-rate")||0.13; state.power={vw:vw,vh:vh,fw:fw,fh:fh,rate:r}; if(act==="log-power"){ const m=((vw*vh+fw*fh)/1000)*r*30; if(m>0){ (state.expenses=state.expenses||[]).push({id:Date.now(),label:"Power (est.)",cat:"electricity",amount:Math.round(m*100)/100,at:isoNow()}); toast("Logged "+("$"+Math.round(m))+" power."); } else { toast("Enter watts for at least one light."); } } else { toast("Saved."); } save(); renderAll(); return; }
  if(act==="add-task"){ const i=document.getElementById("task-new"); const v=i&&i.value.trim(); if(v){ (state.tasks=state.tasks||[]).push({id:Date.now(),text:v,done:false}); save(); renderAll(); } return; }
  if(act==="toggle-task"){ const x=(state.tasks||[]).find(o=>o.id==id); if(x){ x.done=!x.done; save(); renderAll(); } return; }
  if(act==="del-task"){ state.tasks=(state.tasks||[]).filter(o=>o.id!=id); save(); renderAll(); return; }
  if(act==="add-shop"){ const i=document.getElementById("shop-new"); const v=i&&i.value.trim(); if(v){ (state.shopping=state.shopping||[]).push({id:Date.now(),text:v,done:false}); save(); renderAll(); } return; }
  if(act==="toggle-shop"){ const x=(state.shopping||[]).find(o=>o.id==id); if(x){ x.done=!x.done; save(); renderAll(); } return; }
  if(act==="del-shop"){ state.shopping=(state.shopping||[]).filter(o=>o.id!=id); save(); renderAll(); return; }
  if(act==="add-expense"){ const l=document.getElementById("ex-label"),a=document.getElementById("ex-amt"),c=document.getElementById("ex-cat"); const lv=l&&l.value.trim(); const av=a&&parseFloat(a.value); if(lv&&av>0){ (state.expenses=state.expenses||[]).push({id:Date.now(),label:lv,amount:av,cat:(c&&c.value)||"other",at:isoNow()}); save(); renderAll(); toast("Expense added."); } else { toast("Add a label and an amount."); } return; }
  if(act==="del-expense"){ state.expenses=(state.expenses||[]).filter(o=>o.id!=id); save(); renderAll(); return; }
  if(act==="add-height"){ heightModal(plantById(id)); return; }
  if(act==="set-stage"){ const t=plantById(id); if(t){ t.stage=v; save(); renderAll(); toast("Stage set to "+cap(v)+"."); } return; }
  if(act==="save-soil-target"){ const t=plantById(id); const lo=parseFloat($("#soil-lo").value), hi=parseFloat($("#soil-hi").value);
      if(t&&!isNaN(lo)&&!isNaN(hi)){ const L=clamp(lo,5,95), H=clamp(Math.max(hi,L+5),L+5,100); t.soilTarget=[L,H]; save(); renderAll(); toast("Soil target saved."); } return; }
});
document.addEventListener("input", e=>{
  if(e.target.id==="note-search"||e.target.id==="cmp-note-search"){ var q=e.target.value.toLowerCase().trim(); var lid=e.target.id==="note-search"?"note-list":"cmp-note-list"; var L=document.getElementById(lid); if(L){ L.querySelectorAll("[data-search]").forEach(function(r){ r.style.display=(!q||r.dataset.search.indexOf(q)>=0)?"":"none"; }); } return; }
  const nm=e.target.closest('[data-input="name"]'); if(nm){ state.profileName=nm.value; save(); return; }
});

/* ============ theme + boot ============ */
function applyTheme(){ document.documentElement.setAttribute("data-theme", state.theme); }
(function(){ const pi=document.getElementById("photoInput");
  if(pi) pi.addEventListener("change",e=>{ const f=e.target.files&&e.target.files[0]; e.target.value=""; if(f) handlePhotoFile(f); });
})();

function tutorialOverlay(){
  const steps=[
    {view:"dashboard", ic:ICON.gauge, c:"var(--accent)", t:"Welcome \u2014 this is your dashboard", b:"Your grow on autopilot. The dashboard surfaces what needs you right now \u2014 water this, refill that \u2014 plus environment, water, and growth at a glance. You\u2019re on sample data, so explore freely."},
    {view:"plants", ic:ICON.leaf, c:"#2bb3a3", t:"Plants", b:"Each plant gets its own page: live camera, sensor map (air, leaf, and soil at three depths), dated notes, and a height log. Tap any card to open it."},
    {view:"calendar", ic:ICON.cal, c:"#8b5cff", t:"Calendar & Compare", b:"Every plant on its own timeline, built automatically. The Compare tab lines runs up side by side \u2014 finish a plant and you get real run-to-run yield and cost per gram."},
    {view:"tasks", ic:ICON.check, c:"var(--good)", t:"Tasks", b:"Auto stage-tasks for each plant plus your own to-dos, so you always know what\u2019s next. No shame if something slips \u2014 just pick it back up."},
    {view:"budget", ic:ICON.wallet, c:"var(--watch)", t:"Budget", b:"Track spend and watch it become a true cost per gram as you log harvests. When your sensors come online, none of this changes."}
  ];
  let i=0;
  const s=document.createElement("div"); s.className="scrim tut-scrim";
  function go(v){ if(v && state.view!==v){ state.view=v; save(); renderAll(); } }
  function paint(){
    const st=steps[i]; go(st.view);
    const dots=steps.map(function(_,k){ return '<span class="tut-dot'+(k===i?' on':'')+'"></span>'; }).join("");
    s.innerHTML='<div class="modal tut-modal">'
      +'<button class="tut-skip" data-skip>Skip</button>'
      +'<div class="tut-head"><div class="tut-ic" style="--tc:'+st.c+'">'+st.ic+'</div>'
      +'<div><div class="tut-step">Step '+(i+1)+' of '+steps.length+'</div><h3 class="tut-h">'+st.t+'</h3></div></div>'
      +'<p class="tut-p">'+st.b+'</p>'
      +'<div class="tut-dots">'+dots+'</div>'
      +'<div class="tut-nav">'+(i>0?'<button class="btn ghost" data-back>Back</button>':'<span></span>')
      +'<button class="btn primary" data-next>'+(i===steps.length-1?"Start growing":"Next")+'</button></div>'
      +'</div>';
  }
  function close(){ state.tutorialSeen=true; state.view="dashboard"; save(); renderAll(); s.classList.remove("show"); setTimeout(function(){ s.remove(); },200); }
  s.addEventListener("click",function(e){
    if(e.target.hasAttribute("data-skip")) return close();
    if(e.target.hasAttribute("data-back")){ if(i>0){ i--; paint(); } return; }
    if(e.target.hasAttribute("data-next")){ if(i<steps.length-1){ i++; paint(); } else close(); return; }
  });
  paint();
  document.body.appendChild(s); requestAnimationFrame(function(){ s.classList.add("show"); });
}
if(!state.stayLoggedIn) state.loggedIn=false;
applyTheme();
renderAll();
if(state.loggedIn && !state.tutorialSeen){ try{ tutorialOverlay(); }catch(e){} }
</script>
